buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "26.3.11579264"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.1")
    }
}

apply plugin: "com.facebook.react.rootproject"

subprojects {
    def configureProject = { proj ->
        if (proj.hasProperty("android")) {
            proj.android {
                defaultConfig {
                    externalNativeBuild {
                        cmake {
                            def patchPath = "${rootProject.projectDir}/std_format_patch.h".replace("\\", "/")
                            arguments "-DANDROID_STL=c++_shared", "-DCMAKE_SHARED_LINKER_FLAGS=-lc++_shared"
                            cppFlags "-std=c++17", "-frtti", "-fexceptions", "-include", "${patchPath}"
                        }
                    }
                }
            }
        }
    }
    
    if (it.state.executed) {
        configureProject(it)
    } else {
        it.afterEvaluate {
            configureProject(it)
        }
    }
}
